spring.application.name=entrypoint

server.port=8081

# Eureka
eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://127.0.0.1:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=UserService
spring.cloud.gateway.routes[1].uri=http://127.0.0.1:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[2].id=creator-service
spring.cloud.gateway.routes[2].uri=lb://CREATOR-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/creators/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=http://127.0.0.1:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[4].id=chat-service
spring.cloud.gateway.routes[4].uri=http://127.0.0.1:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/chat/**

# Unified WebSocket route for SockJS (Handles both HTTP handshake and WS Upgrade)
spring.cloud.gateway.routes[5].id=chat-ws
spring.cloud.gateway.routes[5].uri=http://127.0.0.1:8085
spring.cloud.gateway.routes[5].predicates[0]=Path=/ws/**

# Global CORS Configuration (Centralized here)
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173, http://localhost:5174, http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# CORS Deduplication (Ensures only one set of CORS headers reaches the browser)
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.gateway.access=unrestricted

# Debug
logging.level.org.springframework.cloud.gateway=INFO

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
